<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NEO-RETRO :: BOT v0.1</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-center">
    <div class="crt">
      <div class="terminal">
        <div class="header">
        <span>🟢 SYSTEM ONLINE</span>
        <span class="header-actions">
          <button type="button" class="btn-clear" id="btnClear" title="Clear chat">CLEAR</button>
          <span class="blink">▋</span>
        </span>
        </div>

        <div id="chat"></div>

        <div class="input-area">
        <span class="prompt">></span>
        <input
          id="userInput"
          type="text"
          placeholder="ASK THE MACHINE..."
          autocomplete="off"
        />
        </div>
      </div>
    </div>
    <div class="samples-panel">
      <span class="samples-label">Try asking:</span>
      <div class="samples-list" id="sampleQuestions"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
